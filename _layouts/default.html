<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }} | Sanghyeon Ju</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="{{ '/assets/css/document-v2.css?v=' | append: site.github.build_revision | relative_url }}">
</head>
<body class="document-page">
  <header class="document-header">
    <div class="document-header__inner">
      <a class="document-name" href="https://jujushmaterial.github.io/">Sanghyeon Ju</a>
      <nav class="document-nav" aria-label="Project navigation">
        <a href="{{ '/' | relative_url }}">PROJECT HOME</a>
        <a href="{{ '/study/' | relative_url }}">프로젝트 상세보기</a>
        <a href="{{ '/docs/' | relative_url }}">DOCUMENTS</a>
        <a href="https://logic-to-layout-tutor.vercel.app/" target="_blank" rel="noopener">LIVE DEMO</a>
        <a href="https://www.youtube.com/watch?v=6UpYdEnMlKQ" target="_blank" rel="noopener">VIDEO</a>
      </nav>
    </div>
  </header>

  <section class="document-title">
    <div>
      <p>AI / WEB · LOGIC-TO-LAYOUT</p>
      <h1>{{ page.title | default: site.title }}</h1>
    </div>
  </section>

  <main class="document-main">
    <article class="document-content">
      {{ content }}
    </article>
  </main>

  <footer class="document-footer">
    <a href="https://jujushmaterial.github.io/">← Portfolio Home</a>
    <a href="{{ '/' | relative_url }}">Project Home</a>
    <a href="https://logic-to-layout-tutor.vercel.app/" target="_blank" rel="noopener">Live Demo</a>
    <span>Sanghyeon Ju © 2026</span>
  </footer>

  <script src="{{ '/assets/js/document-cleanup.js?v=' | append: site.github.build_revision | relative_url }}"></script>
</body>
</html>
